<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Converter &amp; Resizer</title>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.min.js"></script>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #d1d5db;
      --success: #16a34a;
      --danger: #dc2626;
      --table-header: #eef2ff;
    }

    body.dark {
      --bg: #111827;
      --card: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --primary: #60a5fa;
      --primary-dark: #3b82f6;
      --border: #374151;
      --success: #4ade80;
      --danger: #f87171;
      --table-header: #374151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 24px;
      text-align: center;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 44px 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--primary);
      background: rgba(37, 99, 235, 0.08);
    }

    .drop-zone h2 {
      margin: 0 0 8px;
    }

    .drop-zone p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    #fileInput {
      display: none;
    }

    #browseBtn {
      width: auto;
      padding: 12px 24px;
      margin-top: 10px;
    }

    label,
    .label {
      font-weight: 700;
      display: block;
      margin-bottom: 8px;
    }

    select,
    input[type="number"],
    input[type="text"],
    input[type="range"] {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--text);
      margin-bottom: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 16px;
      color: var(--text);
